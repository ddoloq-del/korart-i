<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>마이페이지 — Korart-i</title>
  <meta name="description" content="포인트 잔액 확인 및 거래 내역 — Korart-i 한국 K-콘텐츠 AI 영상 생성 스튜디오">
  <meta property="og:type" content="website">
  <meta property="og:title" content="마이페이지 — Korart-i">
  <meta property="og:description" content="포인트 잔액 및 거래 내역 확인">
  <meta property="og:site_name" content="Korart-i">
  <meta property="og:locale" content="ko_KR">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<style>
:root {
  --bg:    #ffffff;
  --bg2:   #f8fafc;
  --bg3:   #e2e8f0;
  --bg4:   #cbd5e1;
  --line:  #cbd5e1;
  --line2: #94a3b8;
  --ink:   #0f172a;
  --ink2:  #334155;
  --ink3:  #64748b;
  --cream: #0f172a;
  --pink:  #6366f1;
  --pink2: #4f46e5;
  --coral: #a78bfa;
  --gold:  #6366f1;
  --gold2: #4f46e5;
  --green: #22c55e;
  --red:   #ef4444;
  --blue:  #3b82f6;
  --teal:  #14b8a6;
  font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  font-size: 14px;
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.5;
}

/* ── Shared GNB+LNB (light, korart 통합 메뉴) ── */
.korart-gnb { position: sticky; top: 0; z-index: 100; background: #ffffff; border-bottom: 1px solid #ebebeb; font-family: 'Pretendard', sans-serif; }
.korart-gnb-inner { max-width: 1400px; margin: 0 auto; height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
.korart-gnb-left { display: flex; align-items: center; gap: 32px; }
.korart-logo { font-size: 22px; font-weight: 900; letter-spacing: -.03em; display: flex; align-items: center; gap: 6px; color: #1a1a1a; text-decoration: none; }
.korart-logo-badge { font-size: 11px; font-weight: 800; background: linear-gradient(135deg, #6366f1, #a78bfa); color: #fff; padding: 3px 7px; border-radius: 4px; letter-spacing: .05em; }
.korart-gnb-right { display: flex; align-items: center; gap: 8px; }
.korart-icon-btn { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #666; background: none; border: none; cursor: pointer; transition: background .15s; }
.korart-icon-btn:hover { background: #f5f5f5; color: #1a1a1a; }
.korart-avatar-btn { width: 34px; height: 34px; border-radius: 0; background: linear-gradient(135deg, #6366f1, #a78bfa); display: flex; align-items: center; justify-content: center; margin-left: 4px; color: #fff; cursor: pointer; }
.korart-avatar-btn svg { width: 18px; height: 18px; stroke-width: 2.2; }
.korart-icon-btn { border-radius: 0; }
.korart-icon-btn svg { width: 20px; height: 20px; stroke-width: 2; }
.korart-subnav { background: #ffffff; border-bottom: 1px solid #ebebeb; }
.korart-subnav-inner { max-width: 1400px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 52px; overflow-x: auto; scrollbar-width: none; }
.korart-subnav-inner::-webkit-scrollbar { display: none; }
.korart-subnav-item { font-size: 14px; font-weight: 700; color: #666; height: 100%; display: flex; align-items: center; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; white-space: nowrap; cursor: pointer; text-decoration: none; }
.korart-subnav-item:hover { color: #1a1a1a; }
.korart-subnav-item.active { color: #1a1a1a; border-color: #6366f1; }
@media (max-width: 768px) {
  .korart-gnb-inner { padding: 0 16px; height: 56px; }
  .korart-gnb-left { gap: 0; }
}

/* ── Topbar ── */
.topbar {
  border-bottom: 1px solid var(--line);
  padding: 14px 32px;
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 24px;
  background: rgba(2, 6, 23, 0.85);
  backdrop-filter: blur(8px);
}
.brand {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -.02em;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}
.brand-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--pink);
  box-shadow: 0 0 12px var(--pink);
}
.brand-text { color: var(--ink); }
.brand-sub {
  font-size: 11px;
  color: var(--ink3);
  font-weight: 500;
  margin-left: 4px;
}

.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}
.user-greeting {
  font-size: 13px;
  color: var(--ink2);
}
.user-greeting strong {
  color: var(--cream);
  font-weight: 700;
}

.btn {
  background: var(--bg3);
  border: 1px solid var(--line2);
  color: var(--ink);
  padding: 8px 14px;
  border-radius: 0;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: .15s;
  font-family: inherit;
  letter-spacing: -0.01em;
}
.btn:hover { background: var(--bg4); border-color: var(--pink); }
.btn-primary {
  background: var(--pink);
  border-color: var(--pink);
  color: #fff;
}
.btn-primary:hover { background: var(--pink2); border-color: var(--pink2); }
.btn-ghost { background: transparent; border-color: var(--line); }
.btn-ghost:hover { background: var(--bg3); }
.btn-sm { padding: 6px 10px; font-size: 12px; }

/* ── Main wrap ── */
.wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 48px 32px 80px;
}

/* ── Hero greeting ── */
.hero {
  margin-bottom: 32px;
}
.hero h1 {
  font-size: clamp(28px, 4vw, 44px);
  font-weight: 800;
  letter-spacing: -.025em;
  line-height: 1.15;
  margin-bottom: 12px;
}
.hero h1 em {
  font-style: normal;
  background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #f472b6 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 800;
}
.hero p {
  font-size: 16px;
  color: var(--ink2);
  max-width: 560px;
}

/* ── Big main tabs (내 자료 / 거래 이력) ── */
.main-tabs {
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--line);
  margin-bottom: 32px;
}
.main-tab {
  padding: 16px 28px;
  cursor: pointer;
  font-size: 18px;
  font-weight: 700;
  color: var(--ink3);
  border: none;
  background: none;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: color .15s, border-color .15s;
  font-family: inherit;
  letter-spacing: -.01em;
}
.main-tab:hover { color: var(--ink2); }
.main-tab.active {
  color: var(--pink);
  border-bottom-color: var(--pink);
  font-weight: 800;
}

/* ── Two big action buttons ── */
.action-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-bottom: 64px;
}
.action-card {
  position: relative;
  background: var(--bg2);
  border: 1px solid var(--line);
  padding: 32px 28px;
  cursor: pointer;
  transition: .2s;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-height: 180px;
  overflow: hidden;
}
.action-card:hover {
  border-color: var(--pink);
  background: var(--bg3);
  transform: translateY(-2px);
}
.action-card::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 60%);
  pointer-events: none;
  transition: .3s;
}
.action-card:hover::before {
  background: radial-gradient(circle, rgba(99, 102, 241, 0.25) 0%, transparent 60%);
}
.action-icon {
  font-size: 32px;
  line-height: 1;
}
.action-card .action-cat {
  font-size: 10px;
  letter-spacing: 0.2em;
  font-weight: 700;
  color: var(--ink3);
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
}
.action-card h3 {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -.02em;
  color: var(--cream);
  margin-top: 4px;
}
.action-card p {
  font-size: 13px;
  color: var(--ink2);
  line-height: 1.5;
}
.action-card .arrow {
  margin-top: auto;
  font-size: 20px;
  color: var(--pink);
  font-weight: 700;
}

/* ── Asset section ── */
.asset-section {
  display: none;
}
.asset-section.active {
  display: block;
}
.asset-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}
.asset-title {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -.02em;
  color: var(--cream);
}

/* tabs */
.asset-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--line);
  margin-bottom: 24px;
  flex-wrap: wrap;
  overflow-x: auto;
}
.asset-tab {
  padding: 12px 18px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink3);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  white-space: nowrap;
  transition: .15s;
  background: none;
  border-left: none;
  border-right: none;
  border-top: none;
  font-family: inherit;
  letter-spacing: -.01em;
}
.asset-tab:hover { color: var(--ink2); }
.asset-tab.active {
  color: var(--cream);
  font-weight: 700;
  border-bottom-color: var(--pink);
}
.asset-tab .count {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink3);
  margin-left: 6px;
}
.asset-tab.active .count { color: var(--pink); }

/* asset grid */
.asset-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}
.asset-card {
  background: var(--bg2);
  border: 1px solid var(--line);
  overflow: hidden;
  transition: .15s;
  position: relative;
}
.asset-card:hover {
  border-color: var(--pink);
}
.asset-card-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  background: var(--bg3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  color: var(--ink3);
  overflow: hidden;
  position: relative;
}
.asset-card-thumb img,
.asset-card-thumb video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.asset-card-body {
  padding: 12px 14px;
}
.asset-card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--cream);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}
.asset-card-meta {
  font-size: 10px;
  color: var(--ink3);
}
.asset-card-actions {
  display: flex;
  gap: 4px;
  padding: 0 12px 12px;
}
.asset-card-actions .btn { flex: 1; font-size: 11px; padding: 5px 8px; }
.asset-card-actions .btn-red {
  background: rgba(239, 68, 68, 0.1);
  border-color: rgba(239, 68, 68, 0.4);
  color: var(--red);
}
.asset-card-actions .btn-red:hover {
  background: var(--red);
  color: #fff;
}

.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--ink3);
}
.empty-state-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}
.empty-state p {
  font-size: 14px;
  margin-bottom: 16px;
}
.empty-state .btn-primary {
  display: inline-block;
  text-decoration: none;
}

.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink3);
  font-size: 13px;
}
.spin {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid var(--line2);
  border-top-color: var(--pink);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--bg3);
  color: var(--ink);
  padding: 12px 20px;
  border: 1px solid var(--line2);
  font-size: 13px;
  z-index: 100;
  opacity: 0;
  transition: .2s;
  pointer-events: none;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* Modal — preview */
.preview-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}
.preview-modal.active { display: flex; }
.preview-modal-content {
  background: var(--bg2);
  border: 1px solid var(--line2);
  max-width: 900px;
  width: 100%;
  max-height: 90vh;
  overflow: auto;
  position: relative;
}
.preview-modal-close {
  position: absolute;
  top: 12px; right: 16px;
  background: none;
  border: none;
  color: var(--ink3);
  font-size: 22px;
  cursor: pointer;
  z-index: 10;
}
.preview-modal-close:hover { color: var(--ink); }
.preview-modal-body { padding: 32px; }
.preview-modal-body img,
.preview-modal-body video {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 0 auto;
}
.preview-modal-info {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--line);
  font-size: 12px;
  color: var(--ink2);
}

/* responsive */
@media (max-width: 768px) {
  .wrap { padding: 32px 20px 60px; }
  .topbar { padding: 12px 20px; }
  .action-grid { grid-template-columns: 1fr; }
  .asset-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .topbar-right { gap: 8px; }
  .user-greeting { display: none; }
}
</style>
</head>
<body>

<!-- ══ 공유 GNB ══ -->
<header class="korart-gnb">
  <div class="korart-gnb-inner">
    <div class="korart-gnb-left">

<!-- ══ Supabase SDK ══ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ============================================================
//  Supabase 초기화
// ============================================================
const SUPABASE_URL = 'https://hidtxdvncqrhjaiosiqd.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_LziYVaJBv9sazBKbos5_UQ_1ZVbEOJb';
const STORAGE_BUCKET = 'korart-assets';

let sb = null;
let currentUser = null;
let currentSession = null;

(async function authBootstrap() {
  if (!window.supabase || !window.supabase.createClient) {
    console.error('[Auth] Supabase SDK 로드 실패');
    return;
  }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true, flowType: 'pkce' },
  });
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      // 비로그인 → index로
      window.location.href = 'index.html';
      return;
    }
    currentSession = session;
    currentUser = session.user;
    onLoginReady();
  } catch (e) {
    console.error('[Auth] 세션 체크 오류:', e);
    window.location.href = 'index.html';
  }
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_OUT' || !session) {
      window.location.href = 'index.html';
    } else {
      currentSession = session;
      currentUser = session.user;
    }
  });
})();

// ============================================================
//  로그인 상태 준비된 후
// ============================================================
async function onLoginReady() {
  // 닉네임 표시 — profiles 테이블에서 가져오거나 user metadata에서
  let nickname = '사용자';
  try {
    const { data: profile } = await sb
      .from('profiles')
      .select('nickname')
      .eq('id', currentUser.id)
      .single();
    if (profile && profile.nickname) {
      nickname = profile.nickname;
    } else if (currentUser.user_metadata?.full_name) {
      nickname = currentUser.user_metadata.full_name;
    } else if (currentUser.email) {
      nickname = currentUser.email.split('@')[0];
    }
  } catch (_) {
    if (currentUser.user_metadata?.full_name) {
      nickname = currentUser.user_metadata.full_name;
    } else if (currentUser.email) {
      nickname = currentUser.email.split('@')[0];
    }
  }

  document.getElementById('userGreeting').innerHTML = `<strong>${escapeHtml(nickname)}</strong>`;
  document.getElementById('heroNickname').textContent = nickname;

  // 이메일 표시
  const emailEl = document.getElementById('userEmail');
  if (emailEl && currentUser.email) {
    emailEl.textContent = currentUser.email;
  }

  // Google 아바타 표시
  const avatarEl = document.getElementById('userAvatar');
  const meta = currentUser.user_metadata || {};
  const avatarUrl = meta.avatar_url || meta.picture || '';
  if (avatarEl && avatarUrl) {
    avatarEl.src = avatarUrl;
    avatarEl.style.display = 'inline-block';
  }

  // 포인트 잔액 표시
  updatePointsDisplay();

  // 카운트 업데이트
  refreshAllCounts();

  // 기본 탭(내 자료) 철 로드 — 아바타 그리드 자동 표시
  if (typeof loadAssetType === 'function') loadAssetType('avatar');
}

// ============================================
// 포인트 잔액 표시 (Worker /api/me)
// ============================================
async function getSupabaseJWT() {
  if (!sb) return null;
  try {
    const { data } = await sb.auth.getSession();
    return data?.session?.access_token || null;
  } catch (e) {
    return null;
  }
}

async function fetchMyPoints() {
  const jwt = await getSupabaseJWT();
  if (!jwt) { console.warn('[Points] JWT 없음'); return null; }
  try {
    const r = await fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + jwt }});
    if (!r.ok) {
      const errText = await r.text();
      console.warn('[Points] /api/me 실패:', r.status, errText);
      return null;
    }
    return await r.json();
  } catch (e) {
    console.error('[Points] 예외:', e);
    return null;
  }
}

async function updatePointsDisplay() {
  const me = await fetchMyPoints();
  console.log('[Points] mypage:', me);
  const el = document.getElementById('userPoints');
  if (!el) return;
  if (!me) {
    el.innerHTML = '<span style="color:var(--ink3);font-size:10px">- P</span>';
    return;
  }
  if (me.unlimited) {
    el.innerHTML = '\u221E P <span style="font-size:9px;color:var(--ink3);font-weight:500;margin-left:2px">(무제한)</span>';
  } else {
    el.innerHTML = me.points.toLocaleString() + ' P';
  }
}

// ============================================================
//  자산 카운트
// ============================================================
async function refreshAllCounts() {
  const types = ['avatar', 'cuts4', 'video', 'merged_video', 'scene', 'custom_scene'];
  for (const type of types) {
    try {
      const { count } = await sb
        .from('user_assets')
        .select('id', { count: 'exact', head: true })
        .eq('user_id', currentUser.id)
        .eq('asset_type', type);
      const el = document.getElementById('cnt-' + type);
      if (el) el.textContent = count || 0;
    } catch (e) {
      console.warn('count error:', type, e);
    }
  }
}

// ============================================================
//  자산 보기 영역 토글
// ============================================================
// ============================================================
//  거래 이력
// ============================================================
function switchMainTab(tab) {
  // 탭 버튼 active 상태 동기화
  document.getElementById('tabAsset').classList.toggle('active', tab === 'asset');
  document.getElementById('tabTx').classList.toggle('active', tab === 'tx');
  // 섹션 표시 전환
  const asset = document.getElementById('assetSection');
  const tx = document.getElementById('txSection');
  if (tab === 'asset') {
    asset.classList.add('active');
    asset.style.display = '';
    tx.classList.remove('active');
    tx.style.display = 'none';
    // 철 로드 시 아바타 탭 자동 로드
    if (typeof loadAssetType === 'function' && currentUser) loadAssetType(_currentType || 'avatar');
  } else {
    asset.classList.remove('active');
    asset.style.display = 'none';
    tx.classList.add('active');
    tx.style.display = 'block';

}

function showTxSection() {
  const section = document.getElementById('txSection');
  if (!section) return;
  section.style.display = 'block';
  section.classList.add('active');
  // 자료 섹션은 닫기
  const asset = document.getElementById('assetSection');
  if (asset) asset.classList.remove('active');
  // 첫 로드
  loadTransactions();
  // 스크롤
  setTimeout(() => {
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);

async function loadTransactions() {
  const container = document.getElementById('txContent');
  const countEl = document.getElementById('txCount');
  if (!container) return;
  container.innerHTML = '<div class="loading"><div class="spin"></div><div style="margin-top:12px">거래 이력 불러오는 중...</div></div>';
  if (countEl) countEl.textContent = '—';

  try {
    const jwt = await getSupabaseJWT();
    if (!jwt) {
      container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--ink3)">로그인이 필요합니다.</div>';
      return;
    }
    const r = await fetch('/api/transactions?limit=100', {
      headers: { 'Authorization': 'Bearer ' + jwt },
    });
    if (!r.ok) {
      const errText = await r.text();
      container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--red)">불러오기 실패: ' + r.status + '</div>';
      return;
    }
    const data = await r.json();
    const transactions = (data && Array.isArray(data.transactions)) ? data.transactions : [];
    if (countEl) countEl.textContent = transactions.length + '건';
    renderTransactions(transactions);
  } catch (e) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--red)">오류: ' + (e.message || '알 수 없음') + '</div>';
  }
}

// 거래 종류 한글화 + 색상
function getTxTypeLabel(tx) {
  const t = (tx.type || tx.tx_type || tx.kind || '').toLowerCase();
  // 양수/음수로 충전/사용 판단 (type 없으면)
  const amount = Number(tx.amount || 0);
  if (t === 'charge' || t === 'topup' || t === 'recharge') return { label: '충전',     color: 'var(--teal)' };
  if (t === 'consume' || t === 'spend' || t === 'use' || t === 'usage')    return { label: '사용',     color: 'var(--ink2)' };
  if (t === 'refund')                                       return { label: '환불',     color: 'var(--gold)' };
  if (t === 'signup_bonus' || t === 'bonus')                return { label: '무료 적립', color: 'var(--pink)' };
  if (t === 'admin_grant' || t === 'admin')                 return { label: '관리자 적립', color: 'var(--pink)' };
  // type 없을 때: amount 부호로 추정
  if (amount > 0) return { label: '적립', color: 'var(--teal)' };
  if (amount < 0) return { label: '사용', color: 'var(--ink2)' };
  return { label: t || '기타', color: 'var(--ink3)' };
}

function renderTransactions(transactions) {
  const container = document.getElementById('txContent');
  if (!container) return;

  if (!transactions.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--ink3)">거래 이력이 없습니다.<br><span style="font-size:10px">영상이나 이미지를 생성하면 여기에 기록됩니다.</span></div>';
    return;
  }

  // 합계 계산
  // Worker 저장 형식: usage = 음수 amount, refund = 양수 amount, 충전류 = 양수 amount
  let totalCharged = 0, totalConsumed = 0, totalRefunded = 0;
  transactions.forEach(tx => {
    const amt = Number(tx.amount || 0);
    const t = (tx.type || tx.tx_type || '').toLowerCase();
    if (t === 'refund') totalRefunded += Math.abs(amt);
    else if (t === 'usage' || t === 'consume' || t === 'spend' || t === 'use') totalConsumed += Math.abs(amt);
    else if (amt > 0) totalCharged += amt;
    else if (amt < 0) totalConsumed += Math.abs(amt);
  });

  const summary = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:16px">' +
    '<div style="background:var(--bg3);border:1px solid var(--line);padding:12px">' +
      '<div style="font-size:9px;color:var(--ink3);font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px">총 적립</div>' +
      '<div style="font-size:16px;color:var(--teal);font-weight:800">+' + totalCharged.toLocaleString() + ' P</div>' +
    '</div>' +
    '<div style="background:var(--bg3);border:1px solid var(--line);padding:12px">' +
      '<div style="font-size:9px;color:var(--ink3);font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px">총 사용</div>' +
      '<div style="font-size:16px;color:var(--ink);font-weight:800">-' + totalConsumed.toLocaleString() + ' P</div>' +
    '</div>' +
    '<div style="background:var(--bg3);border:1px solid var(--line);padding:12px">' +
      '<div style="font-size:9px;color:var(--ink3);font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px">총 환불</div>' +
      '<div style="font-size:16px;color:var(--gold);font-weight:800">+' + totalRefunded.toLocaleString() + ' P</div>' +
    '</div>' +
  '</div>';

  // 테이블
  const rows = transactions.map(tx => {
    const meta = getTxTypeLabel(tx);
    const amt = Number(tx.amount || 0);
    const sign = amt > 0 ? '+' : '';
    const amtColor = amt > 0 ? 'var(--teal)' : (amt < 0 ? 'var(--ink)' : 'var(--ink3)');
    const dt = tx.created_at ? new Date(tx.created_at) : null;
    const dtStr = dt ? (dt.toLocaleDateString('ko-KR') + ' ' + dt.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'})) : '—';
    const desc = tx.description || tx.note || tx.reason || tx.model || '—';
    const balance = (tx.balance_after !== null && tx.balance_after !== undefined) ? Number(tx.balance_after).toLocaleString() + ' P' : '';
    return '<tr style="border-bottom:1px solid var(--line)">' +
      '<td style="padding:10px 8px;font-size:10px;color:var(--ink3);white-space:nowrap">' + dtStr + '</td>' +
      '<td style="padding:10px 8px"><span style="display:inline-block;padding:2px 8px;background:rgba(0,0,0,.2);border:1px solid ' + meta.color + ';color:' + meta.color + ';font-size:10px;font-weight:700">' + meta.label + '</span></td>' +
      '<td style="padding:10px 8px;font-size:11px;color:var(--ink2)">' + escapeHtml(String(desc)) + '</td>' +
      '<td style="padding:10px 8px;font-size:12px;font-weight:800;color:' + amtColor + ';text-align:right;white-space:nowrap">' + sign + amt.toLocaleString() + ' P</td>' +
      '<td style="padding:10px 8px;font-size:10px;color:var(--ink3);text-align:right;white-space:nowrap">' + balance + '</td>' +
    '</tr>';
  }).join('');

  const table = '<div style="overflow-x:auto;background:var(--bg3);border:1px solid var(--line)">' +
    '<table style="width:100%;border-collapse:collapse;min-width:600px">' +
      '<thead style="background:var(--bg2);border-bottom:1px solid var(--line2)">' +
        '<tr>' +
          '<th style="padding:10px 8px;text-align:left;font-size:9px;color:var(--ink3);font-weight:700;letter-spacing:.05em;text-transform:uppercase">날짜</th>' +
          '<th style="padding:10px 8px;text-align:left;font-size:9px;color:var(--ink3);font-weight:700;letter-spacing:.05em;text-transform:uppercase">종류</th>' +
          '<th style="padding:10px 8px;text-align:left;font-size:9px;color:var(--ink3);font-weight:700;letter-spacing:.05em;text-transform:uppercase">설명</th>' +
          '<th style="padding:10px 8px;text-align:right;font-size:9px;color:var(--ink3);font-weight:700;letter-spacing:.05em;text-transform:uppercase">금액</th>' +
          '<th style="padding:10px 8px;text-align:right;font-size:9px;color:var(--ink3);font-weight:700;letter-spacing:.05em;text-transform:uppercase">잔액</th>' +
        '</tr>' +
      '</thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table>' +
  '</div>';

  container.innerHTML = summary + table;
}

// HTML escape (XSS 방지)
function escapeHtml(s) {
  if (typeof s !== 'string') s = String(s);
  return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function showAssetSection() {
  const section = document.getElementById('assetSection');
  section.classList.add('active');
  // 첫 탭 자동 로드
  loadAssetType('avatar');
  // 스크롤
  setTimeout(() => {
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

function switchAssetTab(type) {
  document.querySelectorAll('.asset-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.type === type);
  });
  loadAssetType(type);
}

let _currentType = 'avatar';

async function loadAssetType(type) {
  _currentType = type;
  const container = document.getElementById('assetContent');
  container.innerHTML = '<div class="loading"><div class="spin"></div><div style="margin-top:12px">불러오는 중...</div></div>';

  try {
    const { data, error } = await sb
      .from('user_assets')
      .select('*')
      .eq('user_id', currentUser.id)
      .eq('asset_type', type)
      .order('created_at', { ascending: false })
      .limit(100);
    if (error) throw error;
    renderAssetList(data || [], type);
  } catch (e) {
    container.innerHTML = `<div class="loading" style="color:var(--red)">불러오기 실패: ${escapeHtml(e.message)}</div>`;
  }
}

function renderAssetList(items, type) {
  const container = document.getElementById('assetContent');
  if (!items.length) {
    const labels = {
      avatar: '저장된 아바타가 없어요',
      cuts4: '저장된 4컷이 없어요',
      video: '저장된 영상이 없어요',
      merged_video: '통합 영상이 없어요',
      scene: '저장된 씬 설정이 없어요',
      custom_scene: '나만의 씬이 없어요',
    };
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon" style="font-family:'JetBrains Mono',monospace;color:var(--ink3);letter-spacing:.2em">EMPTY</div>
        <p>${labels[type] || '항목이 없어요'}</p>
        <a href="studio.html?mode=${(type === 'video' || type === 'merged_video') ? 'video' : 'image'}" class="btn btn-primary">스튜디오로 가서 만들기</a>
      </div>
    `;
    return;
  }

  const isVideo = type === 'video' || type === 'merged_video';
  const isImage = type === 'avatar' || type === 'cuts4';

  let html = '<div class="asset-grid">';
  for (const item of items) {
    const date = new Date(item.created_at).toLocaleDateString('ko-KR');
    const sizeKb = item.file_size ? `${(item.file_size / 1024).toFixed(0)} KB` : '';

    let thumbHtml = '';
    const thumb = item.thumbnail_url || (isImage ? item.asset_url : '');
    if (thumb) {
      thumbHtml = `<img src="${escapeAttr(thumb)}" alt="" loading="lazy">`;
    } else if (isVideo) {
      thumbHtml = '<span style="font-family:\'JetBrains Mono\',monospace;font-size:14px;letter-spacing:.15em;color:var(--ink3)">VIDEO</span>';
    } else if (type === 'scene' || type === 'custom_scene') {
      thumbHtml = '<span style="font-family:\'JetBrains Mono\',monospace;font-size:14px;letter-spacing:.15em;color:var(--ink3)">SCENE</span>';
    } else {
      thumbHtml = '<span style="font-family:\'JetBrains Mono\',monospace;font-size:14px;letter-spacing:.15em;color:var(--ink3)">FILE</span>';
    }

    html += `
      <div class="asset-card">
        <div class="asset-card-thumb" onclick="openPreview('${escapeAttr(item.id)}')">
          ${thumbHtml}
        </div>
        <div class="asset-card-body">
          <div class="asset-card-title">${escapeHtml(item.title || '제목 없음')}</div>
          <div class="asset-card-meta">${date}${sizeKb ? ' · ' + sizeKb : ''}</div>
        </div>
        <div class="asset-card-actions">
          <button class="btn btn-sm" onclick="openPreview('${escapeAttr(item.id)}')">보기</button>
          ${item.asset_url ? `<button class="btn btn-sm" onclick="downloadAsset('${escapeAttr(item.asset_url)}', '${escapeAttr(item.title || 'asset')}')">저장</button>` : ''}
          <button class="btn btn-sm btn-red" onclick="deleteAsset('${escapeAttr(item.id)}', this)">삭제</button>
        </div>
      </div>
    `;
  }
  html += '</div>';
  container.innerHTML = html;
}

// ============================================================
//  Preview modal
// ============================================================
let _itemsCache = {};

async function openPreview(itemId) {
  // 다시 fetch (캐시 없음)
  try {
    const { data: item, error } = await sb
      .from('user_assets')
      .select('*')
      .eq('id', itemId)
      .single();
    if (error) throw error;

    const isVideo = item.asset_type === 'video' || item.asset_type === 'merged_video';
    const body = document.getElementById('previewBody');
    let inner = '';
    if (item.asset_url) {
      if (isVideo) {
        inner = `<video controls autoplay src="${escapeAttr(item.asset_url)}" style="max-height:70vh"></video>`;
      } else {
        inner = `<img src="${escapeAttr(item.asset_url)}" alt="" style="max-height:70vh">`;
      }
    } else {
      inner = '<div style="text-align:center;color:var(--ink3);padding:60px">미리보기 없음 (메타데이터만 저장된 항목)</div>';
    }
    inner += `
      <div class="preview-modal-info">
        <div style="font-size:14px;font-weight:700;color:var(--cream);margin-bottom:4px">${escapeHtml(item.title || '제목 없음')}</div>
        <div>${new Date(item.created_at).toLocaleString('ko-KR')}${item.file_size ? ' · ' + (item.file_size/1024).toFixed(0) + ' KB' : ''}</div>
      </div>
    `;
    body.innerHTML = inner;
    document.getElementById('previewModal').classList.add('active');
  } catch (e) {
    toast('오류: ' + e.message);
  }
}

function closePreview() {
  document.getElementById('previewModal').classList.remove('active');
  document.getElementById('previewBody').innerHTML = '';
}

// ============================================================
//  Download
// ============================================================
async function downloadAsset(url, name) {
  try {
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    a.target = '_blank';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    toast('다운로드 시작');
  } catch (e) {
    toast('오류: ' + e.message);
  }
}

// ============================================================
//  Delete
// ============================================================
async function deleteAsset(itemId, btn) {
  if (!confirm('정말 삭제할까요? 되돌릴 수 없어요.')) return;
  try {
    btn.disabled = true;
    btn.textContent = '...';
    // DB row 가져와서 storage path 알아내기
    const { data: item } = await sb
      .from('user_assets')
      .select('*')
      .eq('id', itemId)
      .single();

    // Storage 파일 삭제 (asset_url에서 path 추출)
    if (item && item.asset_url) {
      try {
        // Supabase public URL: ../storage/v1/object/public/<bucket>/<path>
        const m = item.asset_url.match(/\/storage\/v1\/object\/(?:public|sign)\/[^/]+\/(.+?)(?:\?|$)/);
        if (m && m[1]) {
          await sb.storage.from(STORAGE_BUCKET).remove([decodeURIComponent(m[1])]);
        }
      } catch (e) {
        console.warn('storage 삭제 실패 (DB만 삭제):', e);
      }
    }

    // DB row 삭제
    const { error } = await sb
      .from('user_assets')
      .delete()
      .eq('id', itemId);
    if (error) throw error;

    toast('삭제 완료');
    loadAssetType(_currentType);
    refreshAllCounts();
  } catch (e) {
    toast('삭제 실패: ' + e.message);
    btn.disabled = false;
    btn.textContent = '삭제';
  }
}

// ============================================================
//  Logout
// ============================================================
async function logout() {
  if (!confirm('로그아웃 하시겠어요?')) return;
  try {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  } catch (e) {
    toast('오류: ' + e.message);
  }
}

// ============================================================
//  Helpers
// ============================================================
function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function escapeAttr(str) {
  if (str == null) return '';
  return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

let _toastTimer = null;
function toast(msg, ms) {
  ms = ms || 2000;
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}

// ESC로 모달 닫기
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('previewModal').classList.contains('active')) {
    closePreview();
  }
});

if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
